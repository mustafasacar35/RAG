services:
  - type: web
    name: rag-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # Render dashboard'dan elle gir (opsiyonel)
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false   # Drive klasör ID'si
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false   # Service Account JSON string
    disk:
      name: chroma-data
      mountPath: /opt/render/project/src/chroma_db
      sizeGB: 1
